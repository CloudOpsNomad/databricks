name: workday-cicd-stage

# PRs to stage: Git-flow validation, lint, security scan, unit tests, DAB validate+deploy, smoke, rollback on smoke failure, CI gate, auto-merge only if green.
on:
  pull_request:
    branches:
      - stage
    paths:
      - 'workday/**'
      - '.github/workflows/workday-cicd-stage.yml'

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.10'
  DATABRICKS_TARGET: stage
  DATABRICKS_ENV: stage

jobs:
  # -------------------------------------------------------------------------
  # 1. Validate PR — allowed sources into stage and title conventions
  # Acceptance criteria: PR targets stage from develop, hotfix/NDP-*, or chore/sync-main-to-stage-*; title matches pre-release or hotfix pattern (sync PRs exempt)
  # -------------------------------------------------------------------------
  validate_pr:
    name: Validate PR Rules (stage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR source branch
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          echo "__________________________________________"
          echo "🔍 Validating PR source branch"
          echo " Source : $SOURCE_BRANCH"
          echo " Target : $TARGET_BRANCH"
          echo "__________________________________________"
          echo "📜 Rule: PRs to 'stage' must come from 'develop', a 'hotfix/NDP-*' branch, OR a 'chore/sync-main-to-stage-*' branch"
          if [ "$TARGET_BRANCH" != "stage" ]; then
            echo "❌ ERROR: This workflow expects PRs targeting 'stage' (got base: '$TARGET_BRANCH')." > .github_error_msg
            exit 1
          fi
          if [[ "$SOURCE_BRANCH" == "develop" ]]; then
            echo "✅ Source is 'develop' - normal pre-release path"
          elif [[ "$SOURCE_BRANCH" =~ ^chore/sync-main-to-stage- ]]; then
            echo "✅ Source is a main->stage sync branch - allowed"
          elif [[ "$SOURCE_BRANCH" =~ ^hotfix/NDP-[0-9]+(-[a-zA-Z0-9_-]+)?$ ]]; then
            echo "✅ Source is a hotfix branch - allowed"
          else
            echo "❌ '$SOURCE_BRANCH' is not an allowed source for stage"
            echo "❌ ERROR: PRs to 'stage' can only come from 'develop', 'hotfix/NDP-*', or 'chore/sync-main-to-stage-*'." > .github_error_msg
            exit 1
          fi
          echo "✅ PR source branch validation passed"

      - name: Validate PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "__________________________________________"
          echo "🔍 Validating PR title format (pre-release)"
          echo " Title  : $PR_TITLE"
          echo " Source : $SOURCE_BRANCH"
          echo "__________________________________________"
          if [[ "$SOURCE_BRANCH" =~ ^chore/sync-main-to-stage- ]]; then
            echo "⏭️ Automated sync PR - title validation skipped"
          elif [[ "$SOURCE_BRANCH" =~ ^hotfix/NDP-[0-9]+(-[a-zA-Z0-9_-]+)?$ ]]; then
            echo "📜 Rule: hotfix title must match hotfix/NDP-<number>-<YYYY-MM-DD>"
            if [[ ! "$PR_TITLE" =~ ^hotfix/NDP-[0-9]+-[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "❌ '$PR_TITLE' does not match required hotfix format"
              echo "❌ ERROR: Hotfix PR title must be hotfix/NDP-<number>-<YYYY-MM-DD> (e.g., hotfix/NDP-1234-2026-02-19)" > .github_error_msg
              exit 1
            fi
            echo "✅ Hotfix PR title format is correct."
          else
            echo "📜 Rule: Title must match pre-release/NDP-<number>-<YYYY-MM-DD>"
            if [[ ! "$PR_TITLE" =~ ^pre-release/NDP-[0-9]+-[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "❌ '$PR_TITLE' does not match required format"
              echo "❌ ERROR: PR title must be pre-release/NDP-<number>-<YYYY-MM-DD> (e.g., pre-release/NDP-1234-2026-02-19)" > .github_error_msg
              exit 1
            fi
            echo "✅ Pre-release PR title format is correct."
          fi

      - name: Send SNS notification on failure
        if: failure()
        continue-on-error: true
        env:
          SNS_TOPIC_ARN: ${{ secrets.STAGE_SNS_TOPIC_ARN }}
          GH_WORKFLOW: ${{ github.workflow }}
          GH_JOB: ${{ github.job }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_HEAD_REF: ${{ github.head_ref }}
          GH_BASE_REF: ${{ github.base_ref }}
          GH_ACTOR: ${{ github.actor }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          ERROR_MSG="$(cat .github_error_msg 2>/dev/null || echo 'Unknown error. See workflow logs.')"
          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --subject "❌ Stage Branch Protection Failed - PR Validation" \
            --message "Workflow: $GH_WORKFLOW
          $ERROR_MSG
          Job: $GH_JOB
          Branch: $GH_REF_NAME
          PR Source: $GH_HEAD_REF
          PR Target: $GH_BASE_REF
          Triggered by: $GH_ACTOR
          View run: $GH_SERVER_URL/$GH_REPOSITORY/actions/runs/$GH_RUN_ID" || echo "Failed to send SNS notification"

  # -------------------------------------------------------------------------
  # 2. Lint — pylint (Python), nbqa (notebooks), sqlfluff (SQL)
  # Acceptance criteria: Pylint score meets threshold; SQLFluff passes on SQL in notebooks
  # -------------------------------------------------------------------------
  lint:
    name: Lint Code (Python, Notebooks, SQL)
    needs: [validate_pr]
    runs-on:
      - ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: pip install pylint nbqa sqlfluff

      - name: Run Pylint on notebooks
        working-directory: workday
        run: |
          nbqa pylint src/ \
          --output-format=github \
          --ignored-modules=dbutils,spark,pyspark,pyspark.sql,pyspark.sql.window \
          --additional-builtins=dbutils,spark \
          --disable=invalid-name \
          --const-rgx='[a-z_][a-z0-9_]{2,30}$' \
          --variable-rgx='[a-z_][a-z0-9_]{2,30}$' \
          --argument-rgx='[a-z_][a-z0-9_]{2,30}$' \
          --fail-under=9.0

      - name: Run SQLFluff (SQL in notebooks)
        working-directory: workday
        run: sqlfluff lint src/

  # -------------------------------------------------------------------------
  # 3. Secret scan — Bandit SAST, grep for hardcoded credentials, pip-audit
  # Acceptance criteria: No hardcoded credentials in code or notebooks; pip-audit passes on exported prod dependencies; Bandit report uploaded
  # -------------------------------------------------------------------------
  secret_scan:
    name: Secret & Security Scan
    needs: [lint]
    runs-on:
      - ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit[toml] pip-audit uv

      - name: Run Bandit (SAST)
        working-directory: workday
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -f screen -ll # fail on MEDIUM+ severity

      - name: Scan notebooks for hardcoded credentials
        run: |
          echo "Scanning notebooks and Python files for hardcoded credentials..."

          # Patterns: bare tokens, password=, api_key=, secret=, client_secret=
          FOUND=$(grep -rn \
          -E "(DATABRICKS_TOKEN)\s*[:=]\s*['\"]?[a-zA-Z0-9]{20,}|password\s*[:=]\s*['\"]?[^'\" ]{8,}|client_secret\s*[:=]\s*['\"]?[^'\" ]{8,}|api[-_]?key\s*[:=]\s*['\"]?[^'\" ]{8,}|secret\s*[:=]\s*['\"]?[^'\" ]{8,}" \
          workday/src/ workday/tests/ \
          --include="*.py" --include="*.ipynb" || true)

          if [ -n "$FOUND" ]; then
            echo "❌ Potential hardcoded credential detected:"
            echo "$FOUND"
            echo ""
            echo "Use Databricks Secrets (dbutils.secrets.get) or environment variables instead."
            exit 1
          fi
          echo "✅ No hardcoded credentials found."

      - name: Check for vulnerable dependencies
        working-directory: workday
        run: |
          uv export --group prod --no-hashes > /tmp/requirements-audit.txt
          pip-audit -r /tmp/requirements-audit.txt --desc

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-workday
          path: workday/bandit-report.json
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # 4. Unit tests — bronze and silver notebooks on Databricks (stage)
  # Acceptance criteria: Databricks job submits for bronze and silver unit tests complete successfully against stage workspace
  # -------------------------------------------------------------------------
  unit_test:
    name: Unit Tests on Databricks (stage)
    needs: secret_scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Import Unit Test Notebooks
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
        run: |
          databricks workspace import --overwrite --file workday/tests/unit/notebooks/bronze/bronze_workday_test.ipynb --format JUPYTER /Workspace/Users/user@databricks.com/workday/tests/unit/notebooks/bronze/bronze_workday_test.ipynb
          databricks workspace import --overwrite --file workday/tests/unit/notebooks/silver/silver_workday_test.ipynb --format JUPYTER /Workspace/Users/user@databricks.com/workday/tests/unit/notebooks/silver/silver_workday_test.ipynb
      - name: Generate test run JSON with cluster ID
        env:
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID_STAGE }}
          DATABRICKS_ENV: "stage"
        run: |
          jq '.tasks[0].existing_cluster_id=env.DATABRICKS_CLUSTER_ID | .tasks[0].notebook_task.base_parameters.env=env.DATABRICKS_ENV' workday/tests/unit/notebooks/bronze/bronze_workday_test_run.json > workday/tests/unit/notebooks/bronze/bronze_workday_test_run_resolved.json
      - name: Run Bronze Unit Test
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
        run: databricks jobs submit --json @workday/tests/unit/notebooks/bronze/bronze_workday_test_run_resolved.json
      - name: Generate silver test run JSON with cluster ID
        env:
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID_STAGE }}
          DATABRICKS_ENV: "stage"
        run: |
          jq '.tasks[0].existing_cluster_id=env.DATABRICKS_CLUSTER_ID | .tasks[0].notebook_task.base_parameters.env=env.DATABRICKS_ENV' workday/tests/unit/notebooks/silver/silver_workday_test_run.json > workday/tests/unit/notebooks/silver/silver_workday_test_run_resolved.json
      - name: Run Silver Unit Test
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
        run: databricks jobs submit --json @workday/tests/unit/notebooks/silver/silver_workday_test_run_resolved.json

  # -------------------------------------------------------------------------
  # 5. DAB validate and deploy — stage target
  # Acceptance criteria: databricks bundle validate and bundle deploy both succeed for the stage target
  # -------------------------------------------------------------------------
  deploy_bundle:
    name: Validate and Deploy DAB (stage)
    needs: [unit_test]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version
      - name: Validate bundle
        working-directory: workday
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
        run: databricks bundle validate --target ${{ env.DATABRICKS_TARGET }}
      - name: Deploy bundle
        working-directory: workday
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
        run: databricks bundle deploy --target ${{ env.DATABRICKS_TARGET }}

  # -------------------------------------------------------------------------
  # 6. Smoke tests — after DAB deploy to stage
  # Acceptance criteria: Post-deploy smoke job succeeds; on failure bundle is redeployed from PR base SHA and job fails to block merge
  # -------------------------------------------------------------------------
  smoke_test:
    name: Smoke tests after DAB deploy (stage)
    needs: [deploy_bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Run smoke tests
        id: smoke
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
          DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID_STAGE }}
        run: |
          if [ -f workday/tests/smoke/smoke_test_run.json ]; then
            jq '.tasks[0].existing_cluster_id=env.DATABRICKS_CLUSTER_ID | .tasks[0].notebook_task.base_parameters.env="stage"' workday/tests/smoke/smoke_test_run.json > /tmp/smoke-stage.json
            databricks jobs submit --json @/tmp/smoke-stage.json
          else
            jq '.tasks[0].existing_cluster_id=env.DATABRICKS_CLUSTER_ID | .tasks[0].notebook_task.base_parameters.env="stage"' workday/tests/unit/notebooks/silver/silver_workday_test_run.json > /tmp/smoke-fallback.json
            databricks jobs submit --json @/tmp/smoke-fallback.json
          fi
      - name: Rollback bundle to base branch HEAD on smoke failure
        if: failure()
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST_STAGE }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID_STAGE }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET_STAGE }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "Smoke failed — redeploying bundle from PR base SHA $BASE_SHA (tip of ${{ github.base_ref }} at PR open)"
          git fetch origin "${{ github.base_ref }}"
          git checkout "$BASE_SHA"
          cd workday && databricks bundle deploy --target ${{ env.DATABRICKS_TARGET }}
          exit 1

  # -------------------------------------------------------------------------
  # 7. CI gate — aggregate enforcement and optional auto-merge
  # Acceptance criteria: validate_pr, lint, secret_scan, unit_test, deploy_bundle, and smoke_test all succeeded
  # -------------------------------------------------------------------------
  ci_gate:
    name: CI Gate (all checks passed)
    runs-on: ubuntu-latest
    needs: [validate_pr, lint, secret_scan, unit_test, deploy_bundle, smoke_test]
    if: always()
    timeout-minutes: 15
    steps:
      - name: Evaluate results
        run: |
          VALIDATE_PR="${{ needs.validate_pr.result }}"
          LINT="${{ needs.lint.result }}"
          SCAN="${{ needs.secret_scan.result }}"
          TESTS="${{ needs.unit_test.result }}"
          DEPLOY="${{ needs.deploy_bundle.result }}"
          SMOKE="${{ needs.smoke_test.result }}"
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| validate_pr | $VALIDATE_PR |" >> $GITHUB_STEP_SUMMARY
          echo "| lint | $LINT |" >> $GITHUB_STEP_SUMMARY
          echo "| secret_scan | $SCAN |" >> $GITHUB_STEP_SUMMARY
          echo "| unit_test | $TESTS |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy_bundle | $DEPLOY |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke_test | $SMOKE |" >> $GITHUB_STEP_SUMMARY
          if [[ "$VALIDATE_PR" != "success" || "$LINT" != "success" || "$SCAN" != "success" || "$TESTS" != "success" || "$DEPLOY" != "success" || "$SMOKE" != "success" ]]; then
            echo "❌ CI Gate failed - merge blocked."
            exit 1
          fi
          echo "✅ All CI checks passed. This PR is ready for review and merge."

      - name: Send SNS notification
        if: always()
        continue-on-error: true
        env:
          SNS_TOPIC_ARN: ${{ secrets.STAGE_SNS_TOPIC_ARN }}
        run: |
          if [[ "${{ needs.smoke_test.result }}" == "success" ]]; then
            SUBJECT="✅ Stage CI Passed (PR #${{ github.event.pull_request.number }})"
          else
            SUBJECT="❌ Stage CI Failed (PR #${{ github.event.pull_request.number }})"
          fi
          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --subject "$SUBJECT" \
            --message "Workflow: ${{ github.workflow }}
          validate_pr: ${{ needs.validate_pr.result }}
          lint: ${{ needs.lint.result }}
          secret_scan: ${{ needs.secret_scan.result }}
          unit_test: ${{ needs.unit_test.result }}
          deploy_bundle: ${{ needs.deploy_bundle.result }}
          smoke_test: ${{ needs.smoke_test.result }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "Failed to send SNS"

      - name: Generate App Token
        id: generate_token
        if: success()
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: databricks

      - name: Auto-merge PR after successful CI
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          for attempt in $(seq 1 5); do
            echo "Attempt $attempt/5..."
            if gh pr merge "$PR_NUMBER" --auto --squash; then
              echo "✅ PR auto-merge initiated."
              exit 0
            fi
            sleep 15
          done
          exit 1
